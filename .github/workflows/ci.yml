name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lint tools
        run: pip install "black==25.1.0" isort flake8 ruff

      - name: Run all lint checks
        run: |
          failures=0
          black --check src/ tests/ || failures=$((failures+1))
          isort --check src/ tests/ || failures=$((failures+1))
          flake8 src/ tests/ || failures=$((failures+1))
          ruff check src/ tests/ || failures=$((failures+1))
          exit $failures

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y calculix-ccx libglu1-mesa

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff

      - name: Run fast tests
        run: pytest -m "not slow" --cov=ifc_structural_mechanics --cov-report=xml -v

      - name: Run slow tests
        run: pytest -m slow -v
        continue-on-error: true

      - name: Upload coverage
        if: matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
